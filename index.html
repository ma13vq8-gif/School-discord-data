<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNX · Shy-ng-ks</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --bg: #0d1117; --sidebar: #0a0c10; --accent: #5865f2; --text: #e6edf3; 
            --muted: #7d8590; --danger: #f85149; --green: #2ea043; --bubble: #161b22; --border: #21262d;
            --owner: #f50; --admin: #ff8c00;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #gate { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s; }
        .card { background: var(--sidebar); padding: 30px; border-radius: 16px; width: 380px; text-align: center; border: 1px solid var(--border); }
        .hidden { display: none !important; }
        .logo { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, var(--accent), #7983f5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-sec { background: var(--bubble); border: 1px solid var(--border); }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
        .sidebar-header { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
        .main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg); }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .chat-log { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { background: var(--bubble); padding: 12px 16px; border-radius: 12px; max-width: 80%; width: fit-content; border: 1px solid var(--border); word-break: break-word; }
        .msg-bubble b { font-weight: 600; margin-right: 8px; }
        .owner-tag { color: var(--owner); font-size: 10px; font-weight: bold; margin-left: 5px; }
        .admin-tag { color: var(--admin); font-size: 10px; font-weight: bold; margin-left: 5px; }
        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .input-area input { flex: 1; margin: 0; }
        .friend-item { padding: 10px 12px; margin-bottom: 4px; background: var(--bubble); border-radius: 6px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .friend-item:hover { background: #1c232c; }
        .request-item { padding: 10px 12px; margin-bottom: 4px; background: var(--bubble); border-radius: 6px; display: flex; align-items: center; justify-content: space-between; }
        .badge { background: var(--accent); color: white; padding: 4px 8px; border-radius: 12px; font-size: 10px; border: none; cursor: pointer; margin-left: 5px; }
        .error-message { color: var(--danger); font-size: 12px; margin-top: 10px; padding: 8px; background: rgba(248,81,73,0.1); border-radius: 6px; }
        .success-message { color: var(--green); font-size: 12px; margin-top: 10px; padding: 8px; background: rgba(46,160,67,0.1); border-radius: 6px; }
        .status-badge { font-size: 11px; color: var(--muted); margin-top: 12px; padding: 8px; background: var(--bubble); border-radius: 6px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 1.5s infinite; }
        .status-dot.offline { background: var(--danger); animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .user-info { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .active-chat { border-left: 3px solid var(--accent) !important; background: #1c232c !important; }
        .sync-indicator { font-size: 10px; color: var(--green); margin-left: 10px; }
    </style>
</head>
<body>

<div id="gate">
    <div class="card" id="view-choice">
        <div class="logo">⚡ SKYNX</div>
        <div class="subtitle">Shy-ng-ks · Supabase</div>
        <button class="btn" onclick="setView('login')">Login</button>
        <button class="btn btn-sec" onclick="setView('register')">Register</button>
        <div id="start-status" class="status-badge">
            <span class="status-dot" id="start-dot"></span>
            <span id="start-status-text">Connecting...</span>
        </div>
    </div>

    <div class="card hidden" id="view-login">
        <h3 style="color:var(--accent); margin-bottom:15px;">Login</h3>
        <input type="text" id="l-u" placeholder="Username" autocomplete="off">
        <input type="password" id="l-p" placeholder="Password" autocomplete="off">
        <div id="login-error" class="error-message hidden"></div>
        <button class="btn" onclick="handleAuth('login')">Enter</button>
        <button class="btn btn-sec" onclick="setView('choice')">Back</button>
        <div id="login-status" class="status-badge">
            <span class="status-dot" id="login-dot"></span>
            <span id="login-status-text">Connecting...</span>
        </div>
    </div>

    <div class="card hidden" id="view-register">
        <h3 style="color:var(--green); margin-bottom:15px;">Register</h3>
        <input type="text" id="r-u" placeholder="Username*">
        <input type="password" id="r-p" placeholder="Password*">
        <input type="number" id="r-age" placeholder="Age* (min 5)">
        <input type="text" id="r-name" placeholder="Display Name">
        <div id="register-error" class="error-message hidden"></div>
        <div id="register-success" class="success-message hidden"></div>
        <button class="btn" onclick="handleAuth('register')" style="background:var(--green);">Create</button>
        <button class="btn btn-sec" onclick="setView('choice')">Back</button>
        <div id="register-status" class="status-badge">
            <span class="status-dot" id="register-dot"></span>
            <span id="register-status-text">Connecting...</span>
        </div>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-section">
        <div class="sidebar-header">👥 FRIENDS</div>
        <div id="friend-list"></div>
        <input type="text" id="add-friend-input" placeholder="Add friend" style="margin-top:10px;">
        <button class="btn" onclick="sendFriendRequest()" style="padding:8px; margin-top:5px;">Send</button>
        <div id="friend-error" class="error-message hidden" style="margin-top:8px;"></div>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-header">📨 REQUESTS</div>
        <div id="request-list"></div>
    </div>
    <div style="margin-top:auto; padding:16px; border-top:1px solid var(--border);">
        <div class="user-info">
            <span>🟢</span><span id="display-user">Offline</span><span id="user-tag"></span>
        </div>
        <button class="btn btn-sec" onclick="logout()" style="padding:8px;">Logout</button>
    </div>
</div>

<div class="main">
    <div class="chat-header" id="chat-header">💬 Select a friend</div>
    <div id="log" class="chat-log"></div>
    <div id="input-container" class="input-area hidden">
        <input type="text" id="msg-in" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="btn" onclick="sendMessage()" style="width:auto; margin:0;">Send</button>
    </div>
</div>

<script>
    // Supabase Config - FIXED INITIALIZATION
    const SUPABASE_URL = "https://rnwfbwpimaapmhnchoyx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJud2Zid3BpbWFhcG1obmNob3l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NjI1NDAsImV4cCI6MjA5MTMzODU0MH0.U7yWKcufQZU6Uo7Sf_Sv8cEsXKOkJwfOoinJM3couv0";
    
    // Create Supabase client correctly
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let state = { 
        user: null, 
        currentChat: null,
        admins: { owner: "Skynx", admins: ["Skynx", "HesYourGamer"] },
        isConnected: false
    };

    async function checkConnection() {
        try {
            const { error } = await supabaseClient.from('users').select('count', { count: 'exact', head: true });
            updateConnectionStatus(!error);
            console.log('Connection check:', error ? 'Failed' : 'Success');
        } catch(e) {
            console.error('Connection error:', e);
            updateConnectionStatus(false);
        }
    }

    function updateConnectionStatus(connected) {
        state.isConnected = connected;
        const dots = ['start-dot', 'login-dot', 'register-dot'];
        const texts = ['start-status-text', 'login-status-text', 'register-status-text'];
        
        dots.forEach(id => {
            const dot = document.getElementById(id);
            if (dot) dot.className = connected ? 'status-dot' : 'status-dot offline';
        });
        
        texts.forEach(id => {
            const text = document.getElementById(id);
            if (text) text.textContent = connected ? 'Connected' : 'Offline';
        });
    }

    function setView(v) { 
        ['choice','login','register'].forEach(id => document.getElementById('view-'+id).classList.add('hidden')); 
        document.getElementById('view-'+v).classList.remove('hidden');
        checkConnection();
    }

    function getUserTag(username) {
        if (username === state.admins.owner) return '<span class="owner-tag">[OWNER]</span>';
        if (state.admins.admins.includes(username)) return '<span class="admin-tag">[ADMIN]</span>';
        return '';
    }

    async function handleAuth(mode) {
        if (mode === 'register') {
            const u = document.getElementById('r-u').value.trim();
            const p = document.getElementById('r-p').value;
            const age = parseInt(document.getElementById('r-age').value);
            const name = document.getElementById('r-name').value.trim();
            
            if (!u || !p || !age) {
                document.getElementById('register-error').textContent = '❌ All fields required';
                document.getElementById('register-error').classList.remove('hidden');
                return;
            }
            
            const { data: existing } = await supabaseClient.from('users').select('username').eq('username', u).single();
            if (existing) {
                document.getElementById('register-error').textContent = '❌ Username exists';
                document.getElementById('register-error').classList.remove('hidden');
                return;
            }
            
            const { error } = await supabaseClient.from('users').insert([{ username: u, password: p, age, display_name: name || u }]);
            if (error) {
                document.getElementById('register-error').textContent = '❌ ' + error.message;
                document.getElementById('register-error').classList.remove('hidden');
                return;
            }
            
            state.user = u;
            document.getElementById('register-success').textContent = '✅ Account created!';
            document.getElementById('register-success').classList.remove('hidden');
            setTimeout(() => launch(), 500);
        } else {
            const u = document.getElementById('l-u').value.trim();
            const p = document.getElementById('l-p').value;
            
            if (!u || !p) {
                document.getElementById('login-error').textContent = '❌ Enter credentials';
                document.getElementById('login-error').classList.remove('hidden');
                return;
            }
            
            const { data: user, error } = await supabaseClient.from('users').select('*').eq('username', u).eq('password', p).single();
            if (error || !user) {
                document.getElementById('login-error').textContent = '❌ Invalid credentials';
                document.getElementById('login-error').classList.remove('hidden');
                return;
            }
            
            state.user = u;
            launch();
        }
    }

    function launch() {
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => document.getElementById('gate').classList.add('hidden'), 300);
        document.getElementById('display-user').innerText = state.user;
        document.getElementById('user-tag').innerHTML = getUserTag(state.user);
        refreshUI();
        setInterval(refreshUI, 2000);
    }

    async function refreshUI() {
        if (!state.user) return;
        await updateFriendsList();
        await updateRequestList();
        if (state.currentChat) await renderMessages();
    }

    async function renderMessages() {
        const log = document.getElementById('log');
        const { data: messages } = await supabaseClient.from('messages').select('*')
            .or(`from_user.eq.${state.user},to_user.eq.${state.user}`)
            .order('created_at', { ascending: true });
        
        const chatMessages = (messages || []).filter(m => 
            (m.from_user === state.user && m.to_user === state.currentChat) ||
            (m.from_user === state.currentChat && m.to_user === state.user)
        );
        
        if (chatMessages.length === 0) {
            log.innerHTML = `<div style="color:var(--muted); text-align:center; padding:40px;">No messages yet</div>`;
        } else {
            log.innerHTML = chatMessages.map(m => {
                const tag = getUserTag(m.from_user);
                return `<div class="msg-bubble"><b>${m.from_user}${tag}:</b><br>${m.text}</div>`;
            }).join('');
        }
        log.scrollTop = log.scrollHeight;
    }

    function switchChat(target) {
        state.currentChat = target;
        document.getElementById('chat-header').innerHTML = `💬 Chatting with ${target}`;
        document.getElementById('input-container').classList.remove('hidden');
        renderMessages();
    }

    async function updateFriendsList() {
        const container = document.getElementById('friend-list');
        const { data: friends } = await supabaseClient.from('friends').select('*')
            .or(`user1.eq.${state.user},user2.eq.${state.user}`)
            .eq('status', 'accepted');
        
        const friendList = (friends || []).map(f => f.user1 === state.user ? f.user2 : f.user1);
        
        if (friendList.length === 0) {
            container.innerHTML = `<div style="color:var(--muted); font-size:12px; padding:8px;">No friends yet</div>`;
        } else {
            container.innerHTML = friendList.map(f => 
                `<div class="friend-item" onclick="switchChat('${f}')">💬 ${f}</div>`
            ).join('');
        }
    }

    async function updateRequestList() {
        const container = document.getElementById('request-list');
        const { data: requests } = await supabaseClient.from('friends').select('*')
            .eq('user2', state.user)
            .eq('status', 'pending');
        
        if (!requests || requests.length === 0) {
            container.innerHTML = `<div style="color:var(--muted); font-size:12px; padding:8px;">No requests</div>`;
        } else {
            container.innerHTML = requests.map(r => 
                `<div class="request-item">
                    <span>👤 ${r.user1}</span>
                    <span>
                        <button class="badge" onclick="acceptFriend('${r.id}')" style="background:var(--green);">✓</button>
                        <button class="badge" onclick="declineFriend('${r.id}')" style="background:var(--danger);">✗</button>
                    </span>
                </div>`
            ).join('');
        }
    }

    async function sendFriendRequest() {
        const input = document.getElementById('add-friend-input');
        const target = input.value.trim();
        const errorEl = document.getElementById('friend-error');
        
        if (!target || target === state.user) {
            errorEl.textContent = '❌ Invalid username';
            errorEl.classList.remove('hidden');
            return;
        }
        
        const { error } = await supabaseClient.from('friends').insert([{ user1: state.user, user2: target, status: 'pending' }]);
        if (error) {
            errorEl.textContent = '❌ ' + error.message;
            errorEl.classList.remove('hidden');
            return;
        }
        
        errorEl.classList.add('hidden');
        input.value = '';
        refreshUI();
    }

    async function acceptFriend(id) {
        await supabaseClient.from('friends').update({ status: 'accepted' }).eq('id', id);
        refreshUI();
    }

    async function declineFriend(id) {
        await supabaseClient.from('friends').delete().eq('id', id);
        refreshUI();
    }

    async function sendMessage() {
        if (!state.currentChat) return;
        const input = document.getElementById('msg-in');
        const val = input.value.trim();
        if (!val) return;
        
        await supabaseClient.from('messages').insert([{ from_user: state.user, to_user: state.currentChat, text: val }]);
        input.value = '';
        renderMessages();
    }

    function logout() {
        state.user = null;
        state.currentChat = null;
        document.getElementById('gate').style.opacity = '1';
        document.getElementById('gate').classList.remove('hidden');
        setView('choice');
    }

    // Start
    checkConnection();
    setInterval(checkConnection, 5000);
    setView('choice');
</script>
</body>
</html>

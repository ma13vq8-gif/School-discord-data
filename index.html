<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkynxAI · Groq Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: #0a0c10;
            border-radius: 20px;
            border: 1px solid #21262d;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        h2 {
            background: linear-gradient(135deg, #f50, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .chat {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .msg {
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 85%;
            word-break: break-word;
        }
        .user { background: #f50; align-self: flex-end; }
        .bot { background: #161b22; border-left: 3px solid #f50; align-self: flex-start; }
        .error { background: rgba(248,81,73,0.15); color: #f85149; }
        .input-area { display: flex; gap: 10px; }
        input {
            flex: 1;
            padding: 14px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 30px;
            color: white;
            outline: none;
        }
        button {
            padding: 14px 28px;
            background: #f50;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; }
        .status {
            font-size: 11px;
            color: #7d8590;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>⚡ SkynxAI · Groq</h2>
    <div class="chat" id="chat">
        <div class="msg bot">Ready. Using Groq + Llama 3</div>
    </div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Say something..." onkeypress="if(event.key==='Enter') send()">
        <button id="sendBtn" onclick="send()">Send</button>
    </div>
    <div class="status" id="status">Model: llama3-8b-8192</div>
</div>

<script>
    const GROQ_KEY = "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";
    
    let history = [];
    let waiting = false;
    
    const chat = document.getElementById('chat');
    const input = document.getElementById('msgInput');
    const btn = document.getElementById('sendBtn');
    const status = document.getElementById('status');
    
    function add(text, type) {
        const msg = document.createElement('div');
        msg.className = `msg ${type}`;
        msg.textContent = text;
        chat.appendChild(msg);
        chat.scrollTop = chat.scrollHeight;
    }
    
    async function send() {
        const text = input.value.trim();
        if (!text || waiting) return;
        
        input.value = '';
        waiting = true;
        btn.disabled = true;
        status.textContent = 'Thinking...';
        
        add(text, 'user');
        history.push({ role: "user", content: text });
        
        try {
            const messages = [
                { role: "system", content: "You are SkynxAI. Be friendly and concise." },
                ...history.slice(-5)
            ];
            
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: messages,
                    temperature: 0.7,
                    max_tokens: 300
                })
            });
            
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`HTTP ${res.status}: ${errText}`);
            }
            
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            add(reply, 'bot');
            history.push({ role: "assistant", content: reply });
            status.textContent = 'Connected (Llama 3)';
            
        } catch(e) {
            add(`Error: ${e.message}`, 'error');
            status.textContent = `Failed: ${e.message}`;
        } finally {
            waiting = false;
            btn.disabled = false;
            input.focus();
        }
    }
</script>
</body>
</html>
